<!doctype html>
<html><head><base target="_top"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><?!= include('style'); ?></head>
<body>
<header class="top"><h1>🌳 해피트리 학부모 페이지</h1><p>학생 성장기록 확인 · PDF 다운로드 · 상담 신청</p></header>
<main class="wrap">
<section id="login" class="panel"><h2>학부모 로그인</h2><p class="muted">학생명과 전화번호 뒤 4자리를 입력하세요.</p><label>학생명<input id="studentName" placeholder="예: 김민준"></label><label>인증번호<input id="pin" type="password" placeholder="전화번호 뒤 4자리"></label><button class="primary" onclick="login()">확인</button><div id="loginMsg"></div></section>
<section id="portal" class="panel hidden"><h2 id="title">성장기록</h2><div id="reportBox"></div><button onclick="downloadPdf()">📄 PDF 다운로드</button><h3>상담 신청</h3><label>보호자명<input id="parentName"></label><label>상담내용<textarea id="consultMsg" rows="4"></textarea></label><div class="grid2"><label>희망날짜<input id="preferredDate" type="date"></label><label>희망시간<input id="preferredTime" placeholder="예: 오후 3시"></label></div><button class="primary" onclick="submitConsult()">상담 신청하기</button><div id="consultResult"></div><h3>공지사항</h3><div id="notices"></div></section>
</main>
<script>
let currentStudent='', currentReport=null;
function server(fn,...args){return new Promise((res,rej)=>google.script.run.withSuccessHandler(res).withFailureHandler(rej)[fn](...args));}
async function login(){const r=await server('parentLogin',studentName.value,pin.value); if(!r.ok){loginMsg.innerHTML='<div class="err">'+r.message+'</div>';return;} currentStudent=r.studentName; document.getElementById('login').classList.add('hidden'); document.getElementById('portal').classList.remove('hidden'); loadPortal();}
async function loadPortal(){const r=await server('getParentPortalData',currentStudent); currentReport=r.report; title.textContent=currentStudent+' 성장기록'; reportBox.innerHTML=`<div class="cards"><div class="card">성장온도<b>${r.report.temp}</b></div><div class="card">평균<b>${r.report.avgTotal}</b></div><div class="card">기록<b>${r.report.count}회</b></div></div><div class="item"><p>${r.report.comment}</p></div>`; notices.innerHTML=(r.notices||[]).map(n=>`<div class="item"><b>${n['제목']||''}</b><br>${n['내용']||''}</div>`).join('')||'<div class="muted">공지 없음</div>';}
function downloadPdf(){if(currentReport&&currentReport.pdfUrl) window.open(currentReport.pdfUrl,'_blank'); else alert('생성된 PDF가 없습니다. 학원에 문의해주세요.');}
async function submitConsult(){await server('submitParentConsultation',{studentName:currentStudent,parentName:parentName.value,message:consultMsg.value,preferredDate:preferredDate.value,preferredTime:preferredTime.value}); consultResult.innerHTML='<div class="ok">상담 신청이 접수되었습니다.</div>'; consultMsg.value='';}
</script></body></html>
